<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="referrer" content="no-referrer" />
  <title>Inventory – NitipPro Card Inventory</title>
  <meta name="description" content="Kelola inventory kartu Vanguard konsinyasi" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body>
  <div class="app-layout">
    <!-- Sidebar (same template) -->
    <aside class="sidebar" id="sidebar"></aside>
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <main class="main-content">
      <header class="top-bar">
        <button class="hamburger" id="hamburgerBtn"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
        <div class="page-title">
          <h2>Inventory Kartu</h2>
          <span>Kelola semua kartu konsinyasi</span>
        </div>
        <div class="top-bar-right">
          <button class="btn-primary" id="btnAddCard">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            Tambah Kartu
          </button>
        </div>
      </header>

      <div class="content-body">
        <!-- Filters -->
        <div class="filter-bar">
          <div class="search-box">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <input type="text" id="searchInput" placeholder="Cari kartu, pemilik..." />
          </div>
          <select id="filterOwner" class="filter-select">
            <option value="">Semua Pemilik</option>
          </select>
          <select id="filterNation" class="filter-select">
            <option value="">Semua Nation</option>
            <option value="Dragon Empire">Dragon Empire</option>
            <option value="Dark States">Dark States</option>
            <option value="Stoicheia">Stoicheia</option>
            <option value="Lyrical Monasterio">Lyrical Monasterio</option>
            <option value="Brandt Gate">Brandt Gate</option>
            <option value="Keter Sanctuary">Keter Sanctuary</option>
          </select>
          <select id="filterStatus" class="filter-select">
            <option value="">Semua Status</option>
            <option value="Available">Available</option>
            <option value="Auction">Di Lelang</option>
            <option value="Sold">Sold</option>
            <option value="Waiting Shipment">Menunggu Kirim</option>
            <option value="Shipped">Dikirim</option>
            <option value="Waiting Payment">Menunggu Bayar</option>
            <option value="Completed">Selesai</option>
          </select>
          <button class="btn-ghost" id="resetFilter">Reset</button>
        </div>

        <!-- Sort Bar -->
        <div class="sort-bar">
          <span id="totalCount" class="record-count">– kartu</span>
          <div class="sort-controls">
            <label>Urut:</label>
            <select id="sortBy" class="filter-select-sm">
              <option value="date_desc">Terbaru</option>
              <option value="date_asc">Terlama</option>
              <option value="name_asc">Nama A–Z</option>
              <option value="name_desc">Nama Z–A</option>
            </select>
          </div>
          <div class="view-toggle">
            <button class="view-btn active" id="viewGrid" aria-label="Grid view">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
            </button>
            <button class="view-btn" id="viewList" aria-label="List view">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
            </button>
          </div>
        </div>

        <!-- Cards Grid -->
        <div id="inventoryGrid" class="inventory-grid">
          <div class="loading-state">
            <div class="spinner"></div>
            <p>Memuat inventory...</p>
          </div>
        </div>

        <!-- Pagination -->
        <div class="pagination" id="pagination"></div>
      </div>
    </main>
  </div>

  <!-- Modal: Add/Edit Card -->
  <div class="modal-overlay" id="modalCard">
    <div class="modal-box large">
      <div class="modal-header">
        <h3 id="modalCardTitle">Tambah Kartu Baru</h3>
        <button class="modal-close" id="modalCardClose"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
      </div>
      <form id="cardForm" class="modal-form">
        <input type="hidden" id="cardId" />
        <div class="form-row">
          <div class="form-group">
            <label for="cardName">Nama Kartu *</label>
            <input type="text" id="cardName" required placeholder="cth. Dragonic Overlord" />
          </div>
          <div class="form-group">
            <label for="cardNation">Nation *</label>
            <select id="cardNation" required>
              <option value="">Pilih Nation</option>
              <option value="Dragon Empire">Dragon Empire</option>
              <option value="Dark States">Dark States</option>
              <option value="Stoicheia">Stoicheia</option>
              <option value="Lyrical Monasterio">Lyrical Monasterio</option>
              <option value="Brandt Gate">Brandt Gate</option>
              <option value="Keter Sanctuary">Keter Sanctuary</option>
            </select>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="cardOwner">Pemilik *</label>
            <input type="text" id="cardOwner" required placeholder="Nama pemilik kartu" list="ownerList" />
            <datalist id="ownerList"></datalist>
          </div>
          <div class="form-group">
            <label for="cardDateReceived">Tanggal Diterima *</label>
            <input type="date" id="cardDateReceived" required />
          </div>
        </div>
        <div class="form-group">
          <label for="cardImageFile">Gambar Kartu (opsional)</label>
          <input type="file" id="cardImageFile" accept="image/*" />
          <small>Gambar akan otomatis diupload menggunakan ImgBB.</small>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn-ghost" id="cancelCardBtn">Batal</button>
          <button type="submit" class="btn-primary" id="saveCardBtn">
            <span>Simpan Kartu</span>
          </button>
        </div>
      </form>
    </div>
  </div>

  <!-- Modal: Mark Sold -->
  <div class="modal-overlay" id="modalSold">
    <div class="modal-box">
      <div class="modal-header">
        <h3>Tandai Terjual</h3>
        <button class="modal-close" id="modalSoldClose"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
      </div>
      <form id="soldForm" class="modal-form">
        <input type="hidden" id="soldCardId" />
        <p class="modal-subtitle">Kartu: <strong id="soldCardName"></strong></p>
        <div class="form-group">
          <label for="soldBuyer">Nama Pembeli *</label>
          <input type="text" id="soldBuyer" required placeholder="Nama pembeli" />
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="soldPrice">Harga Jual (Rp) *</label>
            <input type="number" id="soldPrice" required min="0" placeholder="150000" />
          </div>
          <div class="form-group">
            <label for="soldDate">Tanggal Jual *</label>
            <input type="date" id="soldDate" required />
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn-ghost" id="cancelSoldBtn">Batal</button>
          <button type="submit" class="btn-primary">Konfirmasi Terjual</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Modal: Detail Card -->
  <div class="modal-overlay" id="modalDetail">
    <div class="modal-box large">
      <div class="modal-header">
        <h3>Detail Kartu</h3>
        <button class="modal-close" id="modalDetailClose"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
      </div>
      <div id="cardDetailContent" class="card-detail-content"></div>
    </div>
  </div>

  <!-- Toast Notification -->
  <div id="toast" class="toast"></div>

  <script src="assets/js/config.js"></script>
  <script src="assets/js/api.js"></script>
  <script src="assets/js/auth.js"></script>
  <script src="assets/js/ui.js"></script>
  <script src="assets/js/inventory.js"></script>
</body>
</html>

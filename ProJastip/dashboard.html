<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dashboard – Antigravity Card Inventory</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="assets/css/style.css"/>
</head>
<body>
<div class="app-layout">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <main class="main-content">
    <header class="top-bar">
      <button class="hamburger" id="hamburgerBtn" aria-label="Menu">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      <div class="page-title">
        <h2>Dashboard</h2>
        <span id="greetingMsg">Selamat datang!</span>
      </div>
      <div class="top-bar-right">
        <span class="date-badge" id="currentDate"></span>
      </div>
    </header>

    <div class="content-body">
      <!-- Stats -->
      <div class="stats-grid">
        <div class="stat-card" style="--c1:#10B981;--c2:#34D399">
          <div class="stat-icon"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg></div>
          <div class="stat-info"><span class="stat-label">Total Inventory</span><span class="stat-value" id="s-total">–</span></div>
        </div>
        <div class="stat-card" style="--c1:#4F8EF7;--c2:#7B5CF7">
          <div class="stat-icon"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg></div>
          <div class="stat-info"><span class="stat-label">Tersedia</span><span class="stat-value" id="s-available">–</span></div>
        </div>
        <div class="stat-card" style="--c1:#F59E0B;--c2:#FBBF24">
          <div class="stat-icon"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg></div>
          <div class="stat-info"><span class="stat-label">Terjual</span><span class="stat-value" id="s-sold">–</span></div>
        </div>
        <div class="stat-card" style="--c1:#EF4444;--c2:#F87171">
          <div class="stat-icon"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="1" y="3" width="15" height="13"/><polygon points="16 8 20 8 23 11 23 16 16 16 16 8"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg></div>
          <div class="stat-info"><span class="stat-label">Menunggu Kirim</span><span class="stat-value" id="s-shipment">–</span></div>
        </div>
        <div class="stat-card" style="--c1:#8B5CF6;--c2:#A78BFA">
          <div class="stat-icon"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="1" y="4" width="22" height="16" rx="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg></div>
          <div class="stat-info"><span class="stat-label">Menunggu Bayar</span><span class="stat-value" id="s-payment">–</span></div>
        </div>
        <div class="stat-card" style="--c1:#06B6D4;--c2:#22D3EE">
          <div class="stat-icon"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg></div>
          <div class="stat-info"><span class="stat-label">Selesai</span><span class="stat-value" id="s-completed">–</span></div>
        </div>
        <div class="stat-card" style="--c1:#F472B6;--c2:#FB7185">
          <div class="stat-icon"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg></div>
          <div class="stat-info"><span class="stat-label">Lelang Aktif</span><span class="stat-value" id="s-auction">–</span></div>
        </div>
        <div class="stat-card" style="--c1:#64748B;--c2:#94A3B8">
          <div class="stat-icon"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg></div>
          <div class="stat-info"><span class="stat-label">Lelang Selesai</span><span class="stat-value" id="s-auctiondone">–</span></div>
        </div>
      </div>

      <!-- Recent -->
      <div class="card-section">
        <div class="section-header">
          <h3>Aktivitas Terbaru</h3>
          <a href="inventory.html" class="btn-link">Lihat Semua →</a>
        </div>
        <div id="recentActivity">
          <div class="loading-state"><div class="spinner"></div></div>
        </div>
      </div>
    </div>
  </main>
</div>

<div id="toast" class="toast"></div>
<script src="assets/js/config.js"></script>
<script src="assets/js/api.js"></script>
<script src="assets/js/auth.js"></script>
<script src="assets/js/ui.js"></script>
<script src="assets/js/dashboard.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Antigravity Card Inventory – Login</title>
  <meta name="description" content="Login ke sistem inventory kartu Vanguard konsinyasi Antigravity" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body class="login-page">
  <div class="login-bg">
    <div class="login-particles" id="particles"></div>
    <div class="login-container">
      <div class="login-card">
        <div class="login-brand">
          <div class="brand-icon">
            <svg width="40" height="40" viewBox="0 0 40 40" fill="none">
              <polygon points="20,2 38,12 38,28 20,38 2,28 2,12" fill="url(#hexGrad)" />
              <defs>
                <linearGradient id="hexGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                  <stop offset="0%" style="stop-color:#4F8EF7"/>
                  <stop offset="100%" style="stop-color:#7B5CF7"/>
                </linearGradient>
              </defs>
              <text x="50%" y="55%" dominant-baseline="middle" text-anchor="middle" fill="white" font-size="16" font-weight="bold" font-family="Outfit">A</text>
            </svg>
          </div>
          <div class="brand-text">
            <h1>Antigravity</h1>
            <span>Card Inventory System</span>
          </div>
        </div>

        <p class="login-subtitle">Masuk ke dashboard manajemen kartu konsinyasi</p>

        <form id="loginForm" class="login-form">
          <div class="form-group">
            <label for="username">Username</label>
            <div class="input-wrapper">
              <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
              <input type="text" id="username" name="username" placeholder="Masukkan username" autocomplete="username" required />
            </div>
          </div>
          <div class="form-group">
            <label for="password">Password</label>
            <div class="input-wrapper">
              <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
              <input type="password" id="password" name="password" placeholder="Masukkan password" autocomplete="current-password" required />
              <button type="button" class="toggle-password" id="togglePassword" aria-label="Toggle password visibility">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              </button>
            </div>
          </div>
          <div id="loginError" class="login-error hidden">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
            <span id="loginErrorMsg">Username atau password salah.</span>
          </div>
          <button type="submit" class="btn-login" id="loginBtn">
            <span id="loginBtnText">Masuk</span>
            <div id="loginSpinner" class="spinner hidden"></div>
          </button>
        </form>

        <div class="login-demo-hint">
          <span>Demo: <strong>admin</strong> / <strong>admin123</strong></span>
        </div>
      </div>

      <div class="login-right">
        <div class="login-visual">
          <div class="floating-card card-1">
            <div class="fc-nation">Dragon Empire</div>
            <div class="fc-name">Dragonic Overlord</div>
            <div class="fc-status available">Available</div>
          </div>
          <div class="floating-card card-2">
            <div class="fc-nation">Keter Sanctuary</div>
            <div class="fc-name">Alfred Early</div>
            <div class="fc-status sold">Sold</div>
          </div>
          <div class="floating-card card-3">
            <div class="fc-nation">Stoicheia</div>
            <div class="fc-name">Sylvan Horned Beast</div>
            <div class="fc-status shipped">Shipped</div>
          </div>
          <div class="stats-preview">
            <div class="sp-item"><span class="sp-num">128</span><span class="sp-label">Inventory</span></div>
            <div class="sp-item"><span class="sp-num">43</span><span class="sp-label">Terjual</span></div>
            <div class="sp-item"><span class="sp-num">12</span><span class="sp-label">Lelang</span></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="assets/js/config.js"></script>
  <script src="assets/js/auth.js"></script>
  <script src="assets/js/login.js"></script>
</body>
</html>

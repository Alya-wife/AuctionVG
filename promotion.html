<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="referrer" content="no-referrer" />
  <title>Promosi – NitipPro Card Inventory</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar" id="sidebar"></aside>
    <div class="sidebar-overlay" id="sidebarOverlay"></div>
    <main class="main-content">
      <header class="top-bar">
        <button class="hamburger" id="hamburgerBtn"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
        <div class="page-title">
          <h2>Manajemen Promosi</h2>
          <span>Banner dan konten promosi</span>
        </div>
        <div class="top-bar-right">
          <button class="btn-primary" id="btnAddPromo">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            Tambah Promosi
          </button>
        </div>
      </header>
      <div class="content-body">
        <div id="promoGrid" class="promo-list">
          <div class="loading-state"><div class="spinner"></div><p>Memuat promosi...</p></div>
        </div>
      </div>
    </main>
  </div>

  <!-- Modal: Add/Edit Promo -->
  <div class="modal-overlay" id="modalPromo">
    <div class="modal-box large">
      <div class="modal-header">
        <h3 id="modalPromoTitle">Tambah Promosi Baru</h3>
        <button class="modal-close" id="modalPromoClose"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
      </div>
      <form id="promoForm" class="modal-form">
        <input type="hidden" id="promoId" />
        <div class="form-group">
          <label for="promoTitle">Judul Promosi *</label>
          <input type="text" id="promoTitle" required placeholder="cth. Diskon Akhir Bulan" />
        </div>
        <div class="form-group">
          <label for="promoImageUrl">URL Gambar Banner (Google Drive) *</label>
          <input type="url" id="promoImageUrl" required placeholder="https://drive.google.com/..." />
        </div>
        <div class="form-group">
          <label for="promoDesc">Deskripsi</label>
          <textarea id="promoDesc" rows="3" placeholder="Deskripsi singkat promosi..."></textarea>
        </div>
        <div class="form-group">
          <label class="checkbox-label">
            <input type="checkbox" id="promoActive" />
            <span>Aktifkan banner ini (nonaktifkan lainnya)</span>
          </label>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn-ghost" id="cancelPromoBtn">Batal</button>
          <button type="submit" class="btn-primary">Simpan</button>
        </div>
      </form>
    </div>
  </div>

  <div id="toast" class="toast"></div>
  <script src="assets/js/config.js"></script>
  <script src="assets/js/api.js"></script>
  <script src="assets/js/auth.js"></script>
  <script src="assets/js/ui.js"></script>
  <script src="assets/js/promotion.js"></script>
</body>
</html>

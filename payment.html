<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pembayaran – Antigravity Card Inventory</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar" id="sidebar"></aside>
    <div class="sidebar-overlay" id="sidebarOverlay"></div>
    <main class="main-content">
      <header class="top-bar">
        <button class="hamburger" id="hamburgerBtn"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
        <div class="page-title">
          <h2>Pembayaran Pemilik</h2>
          <span>Kartu dikirim, menunggu transfer ke pemilik</span>
        </div>
      </header>
      <div class="content-body">
        <div id="paymentList" class="table-card">
          <div class="loading-state"><div class="spinner"></div><p>Memuat data pembayaran...</p></div>
        </div>
      </div>
    </main>
  </div>

  <!-- Modal: Complete Payment -->
  <div class="modal-overlay" id="modalPayment">
    <div class="modal-box">
      <div class="modal-header">
        <h3>Konfirmasi Pembayaran ke Pemilik</h3>
        <button class="modal-close" id="modalPaymentClose"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
      </div>
      <form id="paymentForm" class="modal-form">
        <input type="hidden" id="payCardId" />
        <p class="modal-subtitle">Kartu: <strong id="payCardName"></strong></p>
        <p class="modal-subtitle">Pemilik: <strong id="payOwner"></strong> | Harga: <strong id="payPrice"></strong></p>
        <div class="form-row">
          <div class="form-group">
            <label for="payDate">Tanggal Transfer *</label>
            <input type="date" id="payDate" required />
          </div>
        </div>
        <div class="form-group">
          <label for="payProofFile">Bukti Transfer (opsional)</label>
          <input type="file" id="payProofFile" accept="image/*,application/pdf" />
          <small>Pilih bukti transfer, akan diupload ke Drive</small>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn-ghost" id="cancelPayBtn">Batal</button>
          <button type="submit" class="btn-primary">Selesaikan Transaksi</button>
        </div>
      </form>
    </div>
  </div>

  <div id="toast" class="toast"></div>
  <script src="assets/js/config.js"></script>
  <script src="assets/js/api.js"></script>
  <script src="assets/js/auth.js"></script>
  <script src="assets/js/ui.js"></script>
  <script src="assets/js/payment.js"></script>
</body>
</html>
